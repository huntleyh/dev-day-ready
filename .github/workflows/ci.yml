name: ci

on:
  push:
    paths:
    - main.py
    - src/**
    - tests/**
    - flows/**
    - promptflow/**
    - requirements*.txt
    - .env
    - .github/workflows/ci.yml
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: python -m pip install -r requirements-dev.txt

    - name: Compile check
      run: python -m compileall src tests

    - name: Run tests
      run: pytest -q

    - name: Offline script execution check
      run: python main.py --offline --prompt "Should release 1.0 proceed?"
