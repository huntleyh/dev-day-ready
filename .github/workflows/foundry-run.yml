name: build-test-deploy-agent

on:
  push:
    branches:
    - main
    paths:
    - main.py
    - src/**
    - tests/**
    - flows/**
    - requirements*.txt
    - .github/workflows/foundry-run.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build_test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: python -m pip install -r requirements-dev.txt

    - name: Compile check
      run: python -m compileall main.py src tests flows

    - name: Run tests
      run: pytest -q

  deploy:
    needs: build_test
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
      AZURE_AI_MODEL: ${{ secrets.AZURE_AI_MODEL }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: python -m pip install -r requirements.txt

    - name: Azure OIDC login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Verify Azure context
      run: az account show --output table

    - name: Verify SDK token acquisition
      run: |
        python - <<'PY'
        from foundry_pipeline.auth import get_credential

        token = get_credential().get_token("https://cognitiveservices.azure.com/.default")
        print(f"Token acquired, expires_on={token.expires_on}")
        PY

    - name: Deploy versioned Foundry agent
      run: python -m foundry_pipeline.deploy --name-prefix minimal-foundry-pipeline-agent > deploy-output.json

    - name: Publish deployment summary
      run: |
        python - <<'PY'
        import json
        from pathlib import Path

        data = json.loads(Path("deploy-output.json").read_text(encoding="utf-8"))
        created = data["created"]
        versions = data.get("all_versions", [])

        lines = [
            "## Foundry Deployment",
            f"- Created agent: {created['name']} ({created['id']})",
            f"- Agent version: {created['agent_version']}",
            f"- Flow version: {created['flow_version']}",
            "",
            "### Recent Versions",
        ]

        if versions:
            for item in versions[:10]:
                lines.append(
                    f"- {item['name']} | agent_version={item['agent_version']} | flow_version={item['flow_version']}"
                )
        else:
            lines.append("- No previously deployed versions found.")

        summary_file = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
        summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
        PY

    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: foundry-deploy-output
        path: deploy-output.json
