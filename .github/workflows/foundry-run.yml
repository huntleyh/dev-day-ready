name: foundry-run

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to send to the Foundry pipeline agent
        required: false
        default: Should this release proceed?

permissions:
  id-token: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
      AZURE_AI_MODEL: ${{ secrets.AZURE_AI_MODEL }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: python -m pip install -r requirements.txt

    - name: Azure OIDC login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Run Foundry pipeline
      run: python -m foundry_pipeline.app --prompt "${{ inputs.prompt }}"
